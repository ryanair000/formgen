name: Bootstrap FormPilot source

on:
  push:
    paths:
      - '.sync/**'
      - '.github/workflows/bootstrap-source.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore application source
        shell: bash
        run: |
          cat .sync/chunk* | base64 --decode > /tmp/formpilot-source.tar.gz
          tar -xzf /tmp/formpilot-source.tar.gz -C .
          rm -rf .sync

      - name: Commit complete source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add complete FormPilot application" || exit 0
          git push
